<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}ЧекРез{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
  <div class="bg-shape"></div>
  <header class="topbar">
    <a href="{{ url_for('index') }}" class="brand">ЧекРез</a>
    <nav class="nav">
      <a href="{{ url_for('resume_page') }}">Резюме</a>
      <a href="{{ url_for('vacancy_page') }}">Вакансии</a>
      <a href="{{ url_for('history_page') }}">История</a>
      <div class="profile-menu">
        <button class="profile-btn" type="button" aria-label="Профиль">👤</button>
        <div class="profile-dropdown">
          {% if user %}
          <span class="user-tag">@{{ user['username'] }}</span>
          <a href="{{ url_for('logout_page') }}">Выйти</a>
          {% else %}
          <a href="{{ url_for('login_page') }}">Вход</a>
          <a href="{{ url_for('register_page') }}">Регистрация</a>
          {% endif %}
        </div>
      </div>
    </nav>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
